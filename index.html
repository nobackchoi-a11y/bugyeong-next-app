<!DOCTYPE html>

<title>부경사업단 업무앱</title>
<style>
:root{--blue:#244b86;--bg:#f3f7fc;--line:#dfe8f3;--muted:#64748b}*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR","Malgun Gothic",Arial,sans-serif;background:var(--bg);color:#111827}
.header{background:linear-gradient(135deg,#16294f,#244b86 60%,#2f7e8b);color:#fff;padding:30px 22px 38px;border-bottom-left-radius:34px;border-bottom-right-radius:34px}
.brand{max-width:1180px;margin:0 auto;display:flex;gap:16px;align-items:center}.logo{width:58px;height:58px;border-radius:18px;background:#fff;color:var(--blue);display:grid;place-items:center;font-weight:950;font-size:32px}
h1{margin:0;font-size:28px;letter-spacing:-.8px}.sub{margin-top:6px;opacity:.92}.wrap{max-width:1180px;margin:0 auto;padding:20px 14px 60px}
.notice{background:#eaf3fb;border:1px solid #d7e7f5;color:#173a6b;border-radius:20px;padding:16px 18px;margin-bottom:16px;font-weight:900}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:0 10px 28px rgba(15,47,95,.07);min-height:210px;display:flex;flex-direction:column;justify-content:space-between}
.icon{font-size:38px}.card h2{font-size:21px;margin:10px 0 8px}.card h2 small{display:block;color:var(--blue);font-size:15px;margin-top:3px}.card p{font-size:14px;line-height:1.6;color:var(--muted);margin:0}
.btn{display:inline-block;text-decoration:none;background:var(--blue);color:#fff;border-radius:15px;padding:13px 18px;font-weight:950;margin-top:16px}.footer{text-align:center;color:#64748b;font-size:13px;padding:20px}
@media(max-width:820px){.grid{grid-template-columns:1fr}.card{min-height:150px}.header{border-radius:0 0 26px 26px}}
</style>
</head>
<body>
