<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>부경사업단 업무앱</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Malgun Gothic','Noto Sans KR',Arial,sans-serif;background:#f5f8fd;color:#0f172a}
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
.side{background:linear-gradient(180deg,#253b8f,#17336f);color:#fff;padding:24px 18px;height:100vh;position:sticky;top:0;overflow:auto}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:34px}
.logo{width:54px;height:54px;border-radius:14px;background:white;color:#253b8f;display:grid;place-items:center;font-weight:900;font-size:22px}
.brand h1{font-size:27px;line-height:1.15;margin:0;font-weight:900;letter-spacing:-1px}
.navTitle{font-size:15px;font-weight:900;color:#c7d2fe;margin:0 0 12px 8px}
.menu{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.09);border-radius:15px;padding:18px 16px;margin-bottom:12px;cursor:pointer;transition:.15s}
.menu:hover{background:rgba(255,255,255,.16)}
.menu.active{background:#fff;color:#0f172a}
.menu b{font-size:17px;display:block;margin-bottom:8px}
.menu span{font-size:13px;color:inherit;opacity:.78;font-weight:800}
.sideCard{margin-top:24px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.10);border-radius:15px;padding:18px;line-height:1.75;font-size:13px;color:#fff}
.main{min-width:0;display:grid;grid-template-rows:74px 1fr;height:100vh}
.top{display:flex;align-items:center;justify-content:space-between;padding:0 22px;border-bottom:1px solid #e2e8f0;background:#fff}
.top h2{margin:0;font-size:25px;letter-spacing:-.7px}
.actions{display:flex;gap:8px}
button{border:1px solid #d6e0ee;background:#fff;border-radius:10px;padding:11px 15px;font-weight:900;color:#183153;cursor:pointer}
button.primary{background:#4b63e6;color:#fff;border-color:#4b63e6}
.frameWrap{height:calc(100vh - 74px);background:#fff}
iframe{width:100%;height:100%;border:0;display:block;background:#fff}
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .side{height:auto;position:relative}
  .main{height:auto;min-height:100vh}
  .frameWrap{height:78vh}
}
</style>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#253b8f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="부경업무앱">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon-192.png">

</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">DB</div><h1>부경사업단<br>업무앱</h1></div>
    <div class="navTitle">업무 메뉴</div>
    <div class="menu active" data-page="fc.html" data-title="가동관리(FC이미지제공)"><b>🖼️ 가동관리(FC이미지제공)</b><span>FC 카드 · 이미지 저장</span></div>
    <div class="menu" data-page="manager.html" data-title="가동관리(지점/매니저 실적)"><b>📊 가동관리(지점/매니저 실적)</b><span>지점 · 매니저 · FC 실적</span></div>
    <div class="menu" data-page="agency.html" data-title="대리점 실적"><b>🏢 대리점 실적</b><span>대리점 순위 · 상세 드릴다운</span></div>\n    <div class="menu" data-page="admin.html" data-title="관리자 설정"><b>⚙️ 관리자 설정</b><span>Supabase 연결 · 엑셀 업로드</span></div>
    <div class="sideCard">
      <b>운영 방식</b><br>
      이 앱은 기존 최종 HTML 3개를 원본 그대로 불러옵니다.<br>
      파일명은 index.html / fc.html / manager.html / agency.html 기준입니다.
    </div>
  </aside>
  <main class="main">
    <div class="top">
      <h2 id="pageTitle">가동관리(FC이미지제공)</h2>
      <div class="actions">
        <button class="primary" onclick="openNew()">새 창으로 열기</button>
        <button onclick="reloadFrame()">↻ 새로고침</button>
      </div>
    </div>
    <div class="frameWrap"><iframe id="appFrame" src="fc.html"></iframe></div>
  </main>
</div>
<script>
const frame=document.getElementById('appFrame');
const title=document.getElementById('pageTitle');
document.querySelectorAll('.menu').forEach(m=>{
  m.addEventListener('click',()=>{
    document.querySelectorAll('.menu').forEach(x=>x.classList.remove('active'));
    m.classList.add('active');
    frame.src=m.dataset.page;
    title.textContent=m.dataset.title;
  });
});
function openNew(){ window.open(frame.src,'_blank'); }
function reloadFrame(){ frame.contentWindow.location.reload(); }
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./service-worker.js').catch(function(err){
      console.log('Service worker registration failed:', err);
    });
  });
}
</script>

</body>
</html>
