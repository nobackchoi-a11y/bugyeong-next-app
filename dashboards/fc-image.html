<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC 가동관리 통합 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{
  --bg:#eef3f8;--card:#fff;--ink:#06142b;--muted:#697386;--line:#e5eaf0;
  --blue:#2563eb;--navy:#0f2f5f;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--purple:#7c3aed;
  --soft:#f7f9fc;--yellow:#fff7bf;
}
*{box-sizing:border-box}
body{
  margin:0;background:
  radial-gradient(circle at 0% 0%,rgba(37,99,235,.16),transparent 330px),
  radial-gradient(circle at 100% 0%,rgba(16,185,129,.14),transparent 330px),
  var(--bg);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
}
.wrap{max-width:1320px;margin:0 auto;padding:22px 14px 72px}
.hero{background:linear-gradient(135deg,#06142b 0%,#0f4c81 48%,#10b981 100%);color:white;border-radius:30px;padding:28px 26px;margin-bottom:16px;box-shadow:0 18px 46px rgba(15,47,95,.24);position:relative;overflow:hidden}
.hero:after{content:"";position:absolute;right:-80px;top:-80px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.14)}
.hero h1{margin:0;font-size:30px;letter-spacing:-.8px}
.hero p{margin:9px 0 0;font-size:14px;opacity:.92}
.filters{position:sticky;top:0;z-index:50;background:rgba(238,243,248,.92);backdrop-filter:blur(12px);border:1px solid rgba(229,234,240,.9);border-radius:24px;padding:14px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr 1.25fr 1fr 1fr 1.1fr .72fr;gap:10px;box-shadow:0 12px 32px rgba(15,47,95,.08)}
select,input,button{width:100%;border:1px solid var(--line);border-radius:15px;background:white;padding:12px;font-size:14px;outline:none}
button{background:#0f4c81;color:#fff;border:none;font-weight:900;cursor:pointer}
.summary{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
.kpi{background:rgba(255,255,255,.95);border:1px solid rgba(255,255,255,.75);border-radius:20px;padding:14px;box-shadow:0 10px 25px rgba(15,47,95,.07)}
.kpi .label{font-size:12px;color:var(--muted);font-weight:800}
.kpi .num{font-size:24px;font-weight:950;margin-top:5px;color:#0f4c81}
.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0}
.panelBox{background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:0 12px 28px rgba(15,47,95,.07)}
.panelBox h2{font-size:17px;margin:0 0 12px}
.rankList{display:grid;gap:8px;max-height:290px;overflow:auto}
.rankItem{display:grid;grid-template-columns:1.3fr .8fr .55fr;gap:8px;align-items:center;background:#f8fbff;border:1px solid #edf1f5;border-radius:14px;padding:9px 11px;font-size:13px}
.rankItem b{font-size:14px}.rankItem span{color:var(--muted)}.rankItem strong{text-align:right;color:#0f4c81}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin:16px 4px 10px;color:var(--muted);font-size:13px}
.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:28px;overflow:hidden;box-shadow:0 16px 36px rgba(15,47,95,.10)}
.cardTop{padding:22px 22px 14px;border-bottom:1px dashed var(--line);display:flex;justify-content:space-between;gap:12px}
.name{font-size:30px;font-weight:950;letter-spacing:-.8px}
.greeting{font-size:16px;font-weight:800;color:#334155;margin-top:5px}
.meta{font-size:13px;color:var(--muted);line-height:1.55;margin-top:7px}
.badges{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;align-content:flex-start}
.badge{border-radius:999px;padding:7px 11px;font-size:12px;font-weight:950;white-space:nowrap}
.green{background:#dcfce7;color:#166534}.blue{background:#dbeafe;color:#1e40af}.red{background:#fee2e2;color:#991b1b}.orange{background:#fef3c7;color:#92400e}.purple{background:#ede9fe;color:#5b21b6}.gray{background:#f1f5f9;color:#334155}
.captureActions{display:inline-flex;gap:6px;margin-left:8px;vertical-align:middle;flex-wrap:wrap}
.captureBtn{padding:6px 10px;border-radius:999px;border:1px solid #dbeafe;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:900;cursor:pointer;width:auto}
.copyBtn{border-color:#dcfce7;background:#f0fdf4;color:#166534}
.openBtn{border-color:#fed7aa;background:#fff7ed;color:#9a3412}
.festivalActionRow{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.captureMsg{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#06142b;color:white;padding:11px 16px;border-radius:999px;font-size:13px;font-weight:800;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.25s}
.captureMsg.show{opacity:1}
.captureOnly{display:none}
.festivalBox.capturingFestival .captureOnly{display:block}
.festivalCaptureTitle{
  background:linear-gradient(135deg,#0f4c81,#10b981);
  color:white;
  border-radius:18px;
  padding:18px 20px;
  margin-bottom:14px;
  font-size:clamp(16px, 2.6vw, 24px);
  font-weight:950;
  line-height:1.42;
  letter-spacing:-.7px;
  word-break:keep-all;
  white-space:normal;
}
.section{padding:16px 22px;border-bottom:1px solid #eef2f7}
.section:last-child{border-bottom:none}
.sectionTitle{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sectionTitle h3{margin:0;font-size:17px;letter-spacing:-.3px}
.sectionTitle span{font-size:12px;color:var(--muted);font-weight:800}
.focusGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.focus{background:var(--soft);border:1px solid #edf1f5;border-radius:18px;padding:12px;min-height:78px}
.focus .t{font-size:12px;color:var(--muted);font-weight:800}
.focus .v{margin-top:6px;font-size:20px;font-weight:950;word-break:break-word}
.focus .v.em{color:#0f4c81}.focus .v.good{color:#10b981}.focus .v.warn{color:#ef4444}
.monthTable,.prizeTable{width:100%;border-collapse:separate;border-spacing:0;table-layout:fixed;overflow:hidden;border-radius:16px;border:1px solid #e7edf3}
.monthTable th,.monthTable td,.prizeTable th,.prizeTable td{padding:9px 6px;text-align:center;border-right:1px solid #e7edf3;border-bottom:1px solid #e7edf3;font-size:13px}
.monthTable th,.prizeTable th{background:#eef6ff;color:#23415f;font-weight:950}
.monthTable tr:last-child td,.prizeTable tr:last-child td{border-bottom:none}
.monthTable th:last-child,.monthTable td:last-child,.prizeTable th:last-child,.prizeTable td:last-child{border-right:none}
.prizeTable td{font-size:22px!important;font-weight:900!important;color:#06142b}
.prizeTable th{font-size:17px!important}
td.now{background:var(--yellow);font-weight:950}
.graph{display:flex;align-items:flex-end;gap:7px;height:126px;margin-top:12px;padding:10px;border:1px solid #e7edf3;border-radius:18px;background:#fbfdff}
.barWrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%}
.bar{width:100%;max-width:28px;border-radius:8px 8px 2px 2px;background:linear-gradient(180deg,#2563eb,#10b981);min-height:3px;animation:grow .55s ease both}
.barLabel{font-size:10px;color:var(--muted);white-space:nowrap}
@keyframes grow{from{height:3px;opacity:.35}}
.bridgeWrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.bridgeBox{border:1px solid #e7edf3;border-radius:18px;background:#fbfdff;padding:13px}
.bridgeBox .t{font-size:12px;color:var(--muted);font-weight:900}
.bridgeBox .v{margin-top:5px;font-size:20px;font-weight:950}
.rewardGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.rewardBox{border:1px solid #e7edf3;border-radius:20px;background:#fbfdff;padding:16px}
.rewardBox .t{font-size:12px;color:var(--muted);font-weight:900}
.rewardBox .v{margin-top:6px;font-size:24px;font-weight:950;color:#0f4c81}
.rewardMini,.conditionGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.rewardMini div,.conditionBox{background:#f7f9fc;border:1px solid #edf1f5;border-radius:14px;padding:10px}
.rewardMini b,.conditionBox b{display:block;font-size:11px;color:#697386;margin-bottom:4px}
.rewardMini span,.conditionBox span{font-size:17px;font-weight:950;color:#06142b}
.conditionBox .ok{color:#10b981}.conditionBox .bad{color:#ef4444}
.rewardTable{width:100%;border-collapse:separate;border-spacing:0;table-layout:fixed;overflow:hidden;border-radius:14px;border:1px solid #e7edf3;margin-top:12px}
.rewardTable th,.rewardTable td{padding:8px 6px;text-align:center;border-right:1px solid #e7edf3;border-bottom:1px solid #e7edf3;font-size:12px}
.rewardTable th{background:#eef6ff;color:#23415f;font-weight:950}
.rewardTable tr:last-child td{border-bottom:none}
.rewardTable th:last-child,.rewardTable td:last-child{border-right:none}
.rewardTable .money{font-weight:950;color:#0f7a3d}
.empty{grid-column:1/-1;background:#fff;border:1px dashed #cbd5e1;border-radius:22px;padding:34px;text-align:center;color:var(--muted)}
.pager{display:flex;justify-content:center;align-items:center;gap:8px;margin:20px 0}
.pager button{max-width:110px}
@media(max-width:1150px){.filters{grid-template-columns:repeat(3,1fr)}.cards{grid-template-columns:1fr}.summary{grid-template-columns:repeat(3,1fr)}.dashboard{grid-template-columns:1fr}}
@media(max-width:640px){.wrap{padding:14px 10px 60px}.hero h1{font-size:24px}.filters,.summary{grid-template-columns:1fr}.cardTop{display:block}.badges{justify-content:flex-start;margin-top:12px}.focusGrid,.bridgeWrap,.rewardGrid,.rewardMini,.conditionGrid{grid-template-columns:1fr}.monthTable th,.monthTable td,.prizeTable th,.prizeTable td{font-size:11px;padding:7px 3px}.name{font-size:26px}.dashboard{display:none}}
@media print{body{background:white}.hero,.filters,.summary,.dashboard,.toolbar,.pager,.captureActions,.captureBtn,.captureMsg,.festivalActionRow{display:none!important}.wrap{max-width:none;padding:0}.cards{display:block}.card{break-inside:avoid;box-shadow:none;border:1px solid #ccc;margin:0 0 12px;border-radius:12px}.cardTop{padding:14px}.section{padding:12px}.graph{height:90px}}

.awardCards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.awardCard{background:#f7f9fc;border:1px solid #edf1f5;border-radius:16px;padding:12px;min-height:74px}
.awardCard .label{font-size:12px;color:#697386;font-weight:900;margin-bottom:6px}
.awardCard .value{font-size:21px;font-weight:950;color:#06142b;word-break:keep-all;line-height:1.1}
.awardCard.now{background:#fff7bf;border-color:#f6e58d}
.awardCard.week{background:#fbfdff}
@media(max-width:640px){.awardCards{grid-template-columns:repeat(2,1fr)}.awardCard .value{font-size:18px}}


.platFestivalBox.blank{display:none}
.platFestivalBox .v{color:#047857}
.platCaptureTitle{
  display:none;
  background:linear-gradient(135deg,#064e3b,#10b981);
  color:white;
  border-radius:18px;
  padding:18px 20px;
  margin-bottom:14px;
  font-size:clamp(16px,2.6vw,24px);
  font-weight:950;
  line-height:1.42;
  letter-spacing:-.7px;
  word-break:keep-all;
}
.platFestivalBox.capturingPlat .platCaptureTitle{display:block}
.platActionRow{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.platAwardList{margin-top:10px;display:grid;gap:6px}
.platAwardList div{background:#f7f9fc;border:1px solid #edf1f5;border-radius:12px;padding:8px;font-size:12px;line-height:1.35}
.rewardBox.bridgeRewardMain{grid-column:1/-1}
.rewardGrid.threeBox{grid-template-columns:1fr 1fr}
@media(max-width:640px){.rewardGrid.threeBox{grid-template-columns:1fr}.rewardBox.bridgeRewardMain{grid-column:auto}}
@media print{.platActionRow{display:none!important}}

</style>
<style id='bugyeong-home-button-style'>.bugyeong-home-button{position:fixed;right:16px;top:16px;z-index:999999;background:#244b86;color:#fff!important;text-decoration:none!important;border-radius:999px;padding:10px 14px;font-weight:900;font-family:Arial,sans-serif;box-shadow:0 10px 25px rgba(15,76,129,.25)}@media print{.bugyeong-home-button{display:none!important}}</style>

<div class="wrap">
  <div class="hero">
    <h1>FC 가동관리 통합 대시보드</h1>

  </div>

  <div class="filters">
    <select id="branch"><option value="">전체 지점</option></select>

  <div class="summary">

  <section class="dashboard">

    <div class="panelBox"><h2>매니저별 현황 <span style='font-size:12px;color:#697386;font-weight:800'>(전체 가동금액)</span></h2><div id="managerRank" class="rankList"></div></div>
  </section>

  <div class="toolbar">
    <span id="info">0명 표시</span>
    <span>1페이지 20명 · 인쇄/PDF 저장 최적화</span>
  </div>

  <main id="cards" class="cards"></main>

  <div class="pager">
    <button id="prev">이전</button>
    <span id="pageInfo">1 / 1</span>
    <button id="next">다음</button>
  </div>
</div>

  const v=n(r["당월가동실적"]);
  if(v<=0)return "미가동";
  if(v>=500000)return "50만";
  if(v>=300000)return "30만";
  if(v>=200000)return "20만";
  if(v>=100000)return "10만";
  if(v>=50000)return "5만";
  return "5만미만";
}
function badge(t){
  let c="gray";
  if(t.includes("첫가동"))c="green";
  else if(t.includes("가전페스타"))c="blue";
  else if(t.includes("그린플래티넘"))c="green";
  else if(t.includes("플래티넘")||t.includes("연속"))c="purple";
  else if(t.includes("20만")||t.includes("10만")||t.includes("5만"))c="orange";
  else if(t.includes("브릿지")||t.includes("근접")||t.includes("대상"))c="red";
  return `<span class="badge ${c}">${t}</span>`
}
function maxMonth(r){return Math.max(1,...MONTHS.map(m=>n(r[m])))}
function graph(r){
  const mx=maxMonth(r);
  return `<div class="graph">${MONTHS.map(m=>{
    const h=Math.max(3,Math.round(n(r[m])/mx*92));
    return `<div class="barWrap"><div class="bar" style="height:${h}px"></div><div class="barLabel">${m}</div></div>`
  }).join("")}</div>`
}
function nextBridgeReward(r){
  const may=n(r["브릿지5월"]);
  const tiers=[{name:"10만↑",target:100000,reward:"20만"},{name:"20만↑",target:200000,reward:"60만"},{name:"30만↑",target:300000,reward:"80만"},{name:"50만↑",target:500000,reward:"180만"}];
  const next=tiers.find(t=>may<t.target)||tiers[tiers.length-1];
  return {currentMay:may,name:may>=500000?"50만↑":next.name,target:may>=500000?500000:next.target,remain:may>=500000?0:Math.max(0,next.target-may),reward:may>=500000?"180만":next.reward,tableName:may>=500000?"50만↑":next.name};
}
function nextFestivalReward(r){
  const may=n(r["시상26.05"]);
  const tiers=[
    {name:"프리미엄",monthly:200000,condition:"5~6월 연속 20만↑ / 5~6월 누계 60만",cash:"100만원",gold:"금 1돈",gift1:"LG 퓨리케어 360 공기청정기",gift2:"LG 코드제로 A7 무선청소기"},
    {name:"VIP",monthly:400000,condition:"5~6월 연속 40만↑ / 5~6월 누계 100만",cash:"200만원",gold:"금 2돈",gift1:"삼성 비스포크 AI 냉장고 4도어",gift2:"LG 휘센 오브제 스탠드 에어컨"},
    {name:"레전드",monthly:600000,condition:"5~6월 연속 60만↑ / 5~6월 누계 150만",cash:"300만원",gold:"금 3돈",gift1:"세라젬 파우제 M6 안마의자",gift2:"LG QNED 4K TV 75인치"}
  ];
  let next=tiers.find(t=>may<t.monthly);
  if(!next)next=tiers[tiers.length-1];
  return {name:next.name,may:may,monthlyTarget:next.monthly,mayRemain:Math.max(0,next.monthly-may),condition:next.condition,cash:next.cash,gold:next.gold,gift1:next.gift1,gift2:next.gift2};
}

function platinumFestivalReward(r){
  const arr=activityTags(r);
  const isGreen=arr.some(x=>x.includes("그린플래티넘"));
  const isPlat=arr.some(x=>x.includes("플래티넘"));

  // 플래티넘가전페스티벌은 시상기준실적 기준
  const apr=n(r["시상26.04"]);
  const may=n(r["시상26.05"]);

  if(!(isGreen||isPlat) || apr<200000){
    return {eligible:false};
  }

  // 4월 시상기준실적의 대상구간을 기준으로 5월 잔여금액 계산
  let base;
  if(apr>=600000){
    base={name:"구간 3", target:600000, label:"연속 60만", condition:"4~6월 매월 시상기준실적 60만 이상", prize:"구간 3 가전 중 택 1 또는 하위 구간 선택"};
  }else if(apr>=400000){
    base={name:"구간 2", target:400000, label:"연속 40만", condition:"4~6월 매월 시상기준실적 40만 이상", prize:"구간 2 가전 중 택 1 또는 구간 1 가전 중 택 2"};
  }else{
    base={name:"구간 1", target:200000, label:"연속 20만", condition:"4~6월 매월 시상기준실적 20만 이상", prize:"구간 1 가전 중 택 1"};
  }

  const targetName=isGreen ? "그린플래티넘" : "플래티넘";
  const awards=isGreen
    ? ["구간1: 다이슨 헤어드라이어 / 드롱기 제습기 / 매닉스 음식물 처리기 등", "구간2: LG 김치냉장고 / 세탁기 / 스타일러 등", "구간3: LG 오브제 냉장고 / 트롬 건조기 / 삼성 무풍클래식 등"]
    : ["구간1: 다이슨 에어랩 / 무선청소기 / 드리미 로봇청소기 등", "구간2: 비스포크 김치냉장고 / 오브제 냉장고 등", "구간3: LG전자 워시타워 / 비스포크 냉장고 / 오브제 스탠드 에어컨 등"];

  return {
    eligible:true,
    targetName,
    name:base.name,
    label:base.label,
    condition:base.condition,
    prize:base.prize,
    apr:apr,
    may:may,
    target:base.target,
    remain:Math.max(0,base.target-may),
    awards:awards
  };
}

function festivalRewardTable(x){return `<table class="rewardTable"><tr><th>시상구분</th><th>조건</th><th>현금</th><th>GOLD</th></tr><tr><td>${x.name}</td><td>${x.condition}</td><td class="money">${x.cash}</td><td class="money">${x.gold}</td></tr><tr><th colspan="2">가전제품 ①</th><th colspan="2">가전제품 ②</th></tr><tr><td colspan="2">${x.gift1}</td><td colspan="2">${x.gift2}</td></tr></table>`}
function festivalConditionBoxes(x){return `<div class="conditionGrid"><div class="conditionBox"><b>5월 시상실적</b><span>${fmt(x.may)}</span></div><div class="conditionBox"><b>시상구간 잔여금액</b><span class="${x.mayRemain===0?'ok':'bad'}">${fmt(x.mayRemain)}</span></div><div class="conditionBox"><b>시상구간 목표</b><span>${fmt(x.monthlyTarget)}</span></div></div>`}
function tagArea(r){let arr=activityTags(r);return arr.map(badge).join("")}
function safeFileName(name){return String(name||"FC").replace(/[\\/:*?"<>|]/g,"_").trim()||"FC"}
function safeAttr(value){return String(value||"FC").replaceAll("&","&amp;").replaceAll('"',"&quot;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
function showCaptureMsg(msg){let el=document.getElementById("captureMsg");if(!el){el=document.createElement("div");el.id="captureMsg";el.className="captureMsg";document.body.appendChild(el)}el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),1800)}
async function makeCardBlob(cardId,festivalMode=false,platMode=false){
  const card=document.getElementById(cardId);
  if(!card)throw new Error("대상을 찾을 수 없습니다.");
  if(typeof html2canvas==="undefined")throw new Error("이미지 변환 라이브러리를 불러오지 못했습니다.");
  if(festivalMode)card.classList.add("capturingFestival");
  if(platMode)card.classList.add("capturingPlat");
  try{
    const canvas=await html2canvas(card,{scale:2,backgroundColor:"#ffffff",useCORS:true,ignoreElements:(el)=>el.classList&&(el.classList.contains("captureActions")||el.classList.contains("captureBtn")||el.classList.contains("festivalActionRow"))});
    return await new Promise((resolve,reject)=>{canvas.toBlob(blob=>{if(blob)resolve(blob);else reject(new Error("이미지 생성 실패"))},"image/png")});
  }finally{
    if(festivalMode)card.classList.remove("capturingFestival");
    if(platMode)card.classList.remove("capturingPlat");
  }
}
async function saveBlob(blob,fcName,label){const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`${safeFileName(fcName)}_${label}.png`;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000)}
async function saveImage(cardId,fcName,btn,festival=false,label="실적안내"){const old=btn.textContent;btn.textContent="저장중...";btn.disabled=true;try{const blob=await makeCardBlob(cardId,festival,false);await saveBlob(blob,fcName,label);showCaptureMsg("이미지 저장 완료")}catch(e){console.error(e);showCaptureMsg("이미지 저장 실패")}finally{btn.textContent=old;btn.disabled=false}}
async function copyImage(cardId,fcName,btn,festival=false){const old=btn.textContent;btn.textContent="복사중...";btn.disabled=true;try{const blob=await makeCardBlob(cardId,festival,false);if(!(navigator.clipboard&&window.ClipboardItem))throw new Error("지원 안 됨");await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);showCaptureMsg("클립보드 복사 완료")}catch(e){console.error(e);showCaptureMsg("복사 실패: PC Chrome 권장")}finally{btn.textContent=old;btn.disabled=false}}
async function openImage(cardId,fcName,btn,festival=false,label="실적안내"){const old=btn.textContent;btn.textContent="이미지 생성중...";btn.disabled=true;try{const blob=await makeCardBlob(cardId,festival,false);const url=URL.createObjectURL(blob);const win=window.open(url,"_blank");if(!win){showCaptureMsg("팝업 차단: 이미지 저장을 이용해주세요");await saveBlob(blob,fcName,label);setTimeout(()=>URL.revokeObjectURL(url),3000)}else{showCaptureMsg("새 창 이미지를 길게 눌러 저장/공유");setTimeout(()=>URL.revokeObjectURL(url),60000)}}catch(e){console.error(e);showCaptureMsg("이미지 열기 실패")}finally{btn.textContent=old;btn.disabled=false}}

async function savePlatImage(cardId,fcName,btn){
  const old=btn.textContent;btn.textContent="저장중...";btn.disabled=true;
  try{const blob=await makeCardBlob(cardId,false,true);await saveBlob(blob,fcName,"플래티넘가전페스티벌");showCaptureMsg("이미지 저장 완료")}
  catch(e){console.error(e);showCaptureMsg("이미지 저장 실패")}

}
async function copyPlatImage(cardId,fcName,btn){
  const old=btn.textContent;btn.textContent="복사중...";btn.disabled=true;
  try{const blob=await makeCardBlob(cardId,false,true);if(!(navigator.clipboard&&window.ClipboardItem))throw new Error("지원 안 됨");await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);showCaptureMsg("클립보드 복사 완료")}
  catch(e){console.error(e);showCaptureMsg("복사 실패: PC Chrome 권장")}
  finally{btn.textContent=old;btn.disabled=false}
}
async function openPlatImage(cardId,fcName,btn){
  const old=btn.textContent;btn.textContent="이미지 생성중...";btn.disabled=true;
  try{
    const blob=await makeCardBlob(cardId,false,true);
    const url=URL.createObjectURL(blob);
    const win=window.open(url,"_blank");
    if(!win){showCaptureMsg("팝업 차단: 이미지 저장을 이용해주세요");await saveBlob(blob,fcName,"플래티넘가전페스티벌");setTimeout(()=>URL.revokeObjectURL(url),3000)}
    else{showCaptureMsg("새 창 이미지를 길게 눌러 저장/공유");setTimeout(()=>URL.revokeObjectURL(url),60000)}
  }catch(e){console.error(e);showCaptureMsg("이미지 열기 실패")}
  finally{btn.textContent=old;btn.disabled=false}
}

document.addEventListener("click",(e)=>{
  const s=e.target.closest(".saveImageBtn");if(s){e.preventDefault();saveImage(s.dataset.cardId,s.dataset.fcName,s,false,"실적안내");return}
  const c=e.target.closest(".copyImageBtn");if(c){e.preventDefault();copyImage(c.dataset.cardId,c.dataset.fcName,c,false);return}
  const o=e.target.closest(".openImageBtn");if(o){e.preventDefault();openImage(o.dataset.cardId,o.dataset.fcName,o,false,"실적안내");return}
  const fs=e.target.closest(".festivalSaveBtn");if(fs){e.preventDefault();saveImage(fs.dataset.cardId,fs.dataset.fcName,fs,true,"가전페스타진도");return}
  const fc=e.target.closest(".festivalCopyBtn");if(fc){e.preventDefault();copyImage(fc.dataset.cardId,fc.dataset.fcName,fc,true);return}
  const fo=e.target.closest(".festivalOpenBtn");if(fo){e.preventDefault();openImage(fo.dataset.cardId,fo.dataset.fcName,fo,true,"가전페스타진도");return}
  const ps=e.target.closest(".platSaveBtn");if(ps){e.preventDefault();savePlatImage(ps.dataset.cardId,ps.dataset.fcName,ps);return}
  const pc=e.target.closest(".platCopyBtn");if(pc){e.preventDefault();copyPlatImage(pc.dataset.cardId,pc.dataset.fcName,pc);return}
  const po=e.target.closest(".platOpenBtn");if(po){e.preventDefault();openPlatImage(po.dataset.cardId,po.dataset.fcName,po);return}
});

const branch=$("branch"),manager=$("manager"),agency=$("agency"),activity=$("activity"),runSegment=$("runSegment"),fcSearch=$("fcSearch");
function initOptions(){setOpt(branch,uniq(DATA.map(r=>r["지점"])),"전체 지점");setOpt(manager,uniq(DATA.map(r=>r["매니저"])),"전체 매니저");setOpt(agency,uniq(DATA.map(r=>r["대리점명"])),"전체 대리점명");setOpt(activity,FIXED_ACTIVITIES,"전체 활동대상");setOpt(runSegment,["미가동","5만미만","5만","10만","20만","30만","50만"],"당월가동구간")}
function filtered(){
  const b=branch.value,m=manager.value,a=agency.value,act=activity.value,seg=runSegment.value,q=fcSearch.value.trim().toLowerCase();
  return DATA.filter(r=>{const text=[r["FC명"],r["FC코드"],r["대리점명"],r["대리점번호"],r["지점"],r["매니저"],r["활동대상"]].join(" ").toLowerCase();return (!b||r["지점"]===b)&&(!m||r["매니저"]===m)&&(!a||r["대리점명"]===a)&&(!act||activityTags(r).includes(act))&&(!seg||runSegmentValue(r)===seg)&&(!q||text.includes(q))});
}

function filteredForDashboard(){
  const b=branch.value,m=manager.value,a=agency.value,q=fcSearch.value.trim().toLowerCase();
  return DATA.filter(r=>{
    const text=[r["FC명"],r["FC코드"],r["대리점명"],r["대리점번호"],r["지점"],r["매니저"],r["활동대상"]].join(" ").toLowerCase();
    return (!b||r["지점"]===b)&&(!m||r["매니저"]===m)&&(!a||r["대리점명"]===a)&&(!q||text.includes(q));

function renderSummary(list){$("kTotal").textContent=list.length.toLocaleString("ko-KR");$("kFirst").textContent=list.filter(r=>has(r,"첫가동")).length.toLocaleString("ko-KR");$("kGreen").textContent=list.filter(r=>has(r,"그린플래티넘")).length.toLocaleString("ko-KR");$("kPlat").textContent=list.filter(r=>has(r,"플래티넘")).length.toLocaleString("ko-KR");$("k20").textContent=list.filter(is20).length.toLocaleString("ko-KR");$("kBridge").textContent=list.filter(isBridge).length.toLocaleString("ko-KR")}
function groupRank(list,key){const map=new Map();list.forEach(r=>{const k=r[key]||"미지정";if(!map.has(k))map.set(k,{cnt:0,first:0,twenty:0,bridge:0,total:0});const o=map.get(k);o.cnt++;if(has(r,"첫가동"))o.first++;if(is20(r))o.twenty++;if(isBridge(r))o.bridge++;o.total+=n(r["당월가동실적"])});return [...map.entries()].sort((a,b)=>b[1].total-a[1].total).slice(0,12)}
function rankHtml(list,key){const arr=groupRank(list,key);if(!arr.length)return `<div class="empty">데이터 없음</div>`;return arr.map(([name,o])=>`<div class="rankItem"><b>${name}</b><span>${o.cnt}명 · 첫${o.first} · 20만${o.twenty} · 브${o.bridge}</span><strong>${fmt(o.total)}</strong></div>`).join("")}

        <div class="awardCard week"><div class="label">5월4주</div><div class="value">${fmt(r["5월4주"])}</div></div>
        <div class="awardCard week"><div class="label">5월5주</div><div class="value">${fmt(r["5월5주"])}</div></div>
      </div>
    </section>
    <section class="section"><div class="sectionTitle"><h3>브릿지실적</h3><span>5월실적 / 구간 / 달성여부</span></div><div class="bridgeWrap"><div class="bridgeBox"><div class="t">5월실적</div><div class="v">${fmt(r["브릿지5월"])}</div></div><div class="bridgeBox"><div class="t">구간</div><div class="v">${fmt(r["브릿지구간"])}</div></div><div class="bridgeBox"><div class="t">달성여부</div><div class="v">${fmt(r["브릿지달성여부"])}</div></div></div></section>
    <section class="section"><div class="sectionTitle"><h3>다음 목표 시상</h3><span>시상구간 잔여금액 / 해당 상위구간 시상표</span></div><div class="rewardGrid threeBox">
      <div class="rewardBox bridgeRewardMain"><div class="t">브릿지 상위구간</div><div class="v">${bridgeReward.name}</div><div class="rewardMini"><div><b>5월 시상실적</b><span>${fmt(bridgeReward.currentMay)}</span></div><div><b>5월 잔여금액</b><span>${fmt(bridgeReward.remain)}</span></div><div><b>5월 목표</b><span>${fmt(bridgeReward.target)}</span></div></div>${bridgeRewardTable(bridgeReward)}</div>
      
      <div class="rewardBox platFestivalBox ${platFestival.eligible?'':'blank'}" id="plat-card-${idx}">
        <div class="platCaptureTitle">${fmt(r["FC명"])}FC님<br>플래티넘가전페스티벌 진도 안내 드립니다.<br>꼭 달성 부탁드립니다. 화이팅~~!!</div>
        <div class="t">플래티넘가전페스티벌</div>
        <div class="v">${platFestival.eligible ? platFestival.name : ''}</div>
        ${platinumFestivalTable(platFestival)}
        <div class="platActionRow">
          <button type="button" class="captureBtn platSaveBtn" data-card-id="plat-card-${idx}" data-fc-name="${safeAttr(r["FC명"])}">플래티넘가전 이미지저장</button>
          <button type="button" class="captureBtn copyBtn platCopyBtn" data-card-id="plat-card-${idx}" data-fc-name="${safeAttr(r["FC명"])}">플래티넘가전 클립보드복사(PC용)</button>
          <button type="button" class="captureBtn openBtn platOpenBtn" data-card-id="plat-card-${idx}" data-fc-name="${safeAttr(r["FC명"])}">플래티넘가전 이미지 열기</button>
        </div>
      </div>

      <div class="rewardBox festivalBox" id="festival-card-${idx}">
        <div class="festivalCaptureTitle captureOnly">${fmt(r["FC명"])}FC님<br>가전페스타 진도 안내 드립니다.<br>꼭 달성 부탁드립니다. 화이팅~~!!</div>
        <div class="t">가전페스타 상위구간</div><div class="v">${festivalReward.name}</div>
        ${festivalConditionBoxes(festivalReward)}${festivalRewardTable(festivalReward)}
        <div class="festivalActionRow">
          <button type="button" class="captureBtn festivalSaveBtn" data-card-id="festival-card-${idx}" data-fc-name="${safeAttr(r["FC명"])}">가전페스타 이미지저장</button>
          <button type="button" class="captureBtn copyBtn festivalCopyBtn" data-card-id="festival-card-${idx}" data-fc-name="${safeAttr(r["FC명"])}">가전페스타 클립보드복사(PC용)</button>
          <button type="button" class="captureBtn openBtn festivalOpenBtn" data-card-id="festival-card-${idx}" data-fc-name="${safeAttr(r["FC명"])}">가전페스타 이미지 열기</button>
        </div>
      </div>
    </div></section>
  </article>`;
}
function render(){const list=filtered();renderSummary(list);
  const dashboardList=filteredForDashboard();
  $("branchRank").innerHTML=rankHtml(dashboardList,"지점");
  $("managerRank").innerHTML=rankHtml(dashboardList,"매니저");const max=Math.max(1,Math.ceil(list.length/pageSize));if(page>max)page=max;const view=list.slice((page-1)*pageSize,page*pageSize);$("info").innerHTML=`총 <b>${list.length.toLocaleString("ko-KR")}</b>명 중 <b>${view.length}</b>명 표시`;$("pageInfo").textContent=`${page} / ${max}`;$("cards").innerHTML=view.length?view.map((r,i)=>card(r,i)).join(""):`<div class="empty">조건에 맞는 FC가 없습니다.</div>`}
initOptions();
branch.addEventListener("change",()=>{setOpt(manager,uniq(DATA.filter(r=>!branch.value||r["지점"]===branch.value).map(r=>r["매니저"])),"전체 매니저");setOpt(agency,uniq(DATA.filter(r=>(!branch.value||r["지점"]===branch.value)&&(!manager.value||r["매니저"]===manager.value)).map(r=>r["대리점명"])),"전체 대리점명");page=1;render()});
manager.addEventListener("change",()=>{setOpt(agency,uniq(DATA.filter(r=>(!branch.value||r["지점"]===branch.value)&&(!manager.value||r["매니저"]===manager.value)).map(r=>r["대리점명"])),"전체 대리점명");page=1;render()});
[agency,activity,runSegment].forEach(el=>el.addEventListener("change",()=>{page=1;render()}));
fcSearch.addEventListener("input",()=>{page=1;render()});
$("reset").addEventListener("click",()=>{branch.value="";manager.value="";agency.value="";activity.value="";runSegment.value="";fcSearch.value="";initOptions();page=1;render()});
$("prev").addEventListener("click",()=>{if(page>1){page--;render();scrollTo({top:0,behavior:"smooth"})}});
$("next").addEventListener("click",()=>{const max=Math.max(1,Math.ceil(filtered().length/pageSize));if(page<max){page++;render();scrollTo({top:0,behavior:"smooth"})}});
render();
</script>
</body>
</html>
